server.port=8080
spring.application.name=gitscope

# Allow large request bodies / long-running analysis
server.tomcat.connection-timeout=120000
spring.mvc.async.request-timeout=300000

# Logging
logging.level.com.gitscope=INFO

# ---------------------------------------------------------------------------
# Explicit author alias map (optional).
# Maps a raw git author name -> canonical display name. The normalization
# fallback already merges spacing/case/hyphen/digit variants; use this only for
# identities that normalization cannot connect (e.g. a nickname vs. a full name).
#
# Example:
#   gitscope.aliases.SameepSehgal=Sameep Sehgal
#   gitscope.aliases.sameep-sehgal-1=Sameep Sehgal
#   gitscope.aliases.ssehgal=Sameep Sehgal
# ---------------------------------------------------------------------------
